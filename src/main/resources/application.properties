# Application Configuration
spring.application.name=student-management-system

# Database Configuration (PostgreSQL for production)
spring.datasource.url=jdbc:postgresql://localhost:5432/student_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=student_admin
spring.datasource.password=secure_password_123

# H2 Database Configuration (for development only)
# spring.datasource.url=jdbc:h2:mem:studentdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT Configuration
student.app.jwtSecret=yourStrongSecretKeyForStudents123!
student.app.jwtExpirationMs=86400000 # 24 hours

# API Documentation (Swagger/OpenAPI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.version=1.0.0
springdoc.api-info.title=Student Management API
springdoc.api-info.description=API ??? ??????? ?????????? ?????????? ???????? ??

# Logging Configuration
logging.level.root=INFO
logging.level.com.simul_tech.studentmanagement=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=TRACE

# Log file configuration
logging.file.name=logs/student-management.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.error.include-message=always

# CORS Configuration (for development)
student.cors.allowed-origins=http://localhost:3000
student.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
student.cors.allowed-headers=*
student.cors.allow-credentials=true