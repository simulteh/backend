spring.application.name=net-genius

# Database Configuration
# URL подключения к базе данных PostgreSQL
# Формат: jdbc:postgresql://[хост]:[порт]/[имя_базы_данных]
spring.datasource.url=jdbc:postgresql://localhost:5432/netgenius

# Имя пользователя PostgreSQL (по умолчанию postgres)
spring.datasource.username=postgres

# Пароль пользователя PostgreSQL (замените на ваш пароль)
spring.datasource.password=1669

# Драйвер PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Диалект Hibernate для PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Автоматическое обновление схемы базы данных
# update - обновляет схему, если она изменилась
# create - создает новую схему при каждом запуске
# create-drop - создает схему при запуске и удаляет при остановке
# none - не меняет схему
spring.jpa.hibernate.ddl-auto=update

# Показывать SQL-запросы в логах
spring.jpa.show-sql=true

# Security Configuration
testing.app.secret=c40e168dc7657265c97a10390454a871
testing.app.lifetime=600000

# Logging Configuration
# Уровни логирования для отладки
logging.level.org.springframework.security=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Отключение open-in-view для лучшей производительности
spring.jpa.open-in-view=false

# Режим инициализации базы данных
spring.sql.init.mode=always
